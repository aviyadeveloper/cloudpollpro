name: Terraform CI

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/**/*.tf"
      - "infra/**/*.tfvars"

permissions:
  contents: write
  pull-requests: write

jobs:
  terraform-checks:
    name: Terraform Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Format Check
        run: |
          echo "Checking tf-bootstrap..."
          terraform -chdir=infra/tf-bootstrap fmt -check -recursive
          echo "Checking tf-main..."
          terraform -chdir=infra/tf-main fmt -check -recursive

      - name: Validate tf-bootstrap
        run: |
          terraform -chdir=infra/tf-bootstrap init -backend=false
          terraform -chdir=infra/tf-bootstrap validate

      - name: Validate tf-main
        run: |
          terraform -chdir=infra/tf-main init -backend=false
          terraform -chdir=infra/tf-main validate

  generate-diagrams:
    name: Update Diagrams
    runs-on: ubuntu-latest
    needs: terraform-checks

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: hashicorp/setup-terraform@v3

      - name: Generate diagrams
        uses: patrickchugh/terravision-action@v2
        with:
          source: ./infra/tf-main
          outfile: docs/architecture/diagram
          format: both

      - name: Check for changes
        id: check_changes
        run: |
          git diff --quiet docs/ || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit diagrams to PR
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/
          git commit -m "docs: update architecture diagrams [skip ci]"
          git push

      - name: Comment on PR
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📊 Architecture diagrams updated! Check the `docs/architecture/` folder in this PR.'
            })

      - name: Upload diagrams as artifact
        uses: actions/upload-artifact@v4
        with:
          name: architecture-diagrams
          path: docs/architecture/
