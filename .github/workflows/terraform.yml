name: Terraform CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-checks:
    name: Terraform Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Terraform changes
        id: check_changes
        run: |
          if git diff --name-only origin/main...HEAD | grep -qE '^infra/.*\.(tf|tfvars)$|^\.github/workflows/terraform\.yml$'; then
            echo "terraform_changed=true" >> $GITHUB_OUTPUT
          else
            echo "terraform_changed=false" >> $GITHUB_OUTPUT
            echo "No Terraform files changed, skipping checks"
          fi

      - uses: hashicorp/setup-terraform@v3
        if: steps.check_changes.outputs.terraform_changed == 'true'

      - name: Format Check
        if: steps.check_changes.outputs.terraform_changed == 'true'
        run: |
          echo "Checking tf-bootstrap..."
          terraform -chdir=infra/tf-bootstrap fmt -check -recursive
          echo "Checking tf-main..."
          terraform -chdir=infra/tf-main fmt -check -recursive

      - name: Validate tf-bootstrap
        if: steps.check_changes.outputs.terraform_changed == 'true'
        run: |
          terraform -chdir=infra/tf-bootstrap init -backend=false
          terraform -chdir=infra/tf-bootstrap validate

      - name: Validate tf-main
        if: steps.check_changes.outputs.terraform_changed == 'true'
        run: |
          terraform -chdir=infra/tf-main init -backend=false
          terraform -chdir=infra/tf-main validate
