apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: default
data:
  redis.conf: |
    # Network
    bind 0.0.0.0
    port 6379
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300

    # Persistence - AOF (Append Only File) for durability
    appendonly yes
    appendfilename "appendonly.aof"
    appendfsync everysec
    no-appendfsync-on-rewrite no
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb

    # Persistence - RDB snapshots as backup
    # Save after 900 sec if at least 1 key changed
    save 900 1
    # Save after 300 sec if at least 10 keys changed
    save 300 10
    # Save after 60 sec if at least 10000 keys changed
    save 60 10000
    stop-writes-on-bgsave-error yes
    rdbcompression yes
    rdbchecksum yes
    dbfilename dump.rdb

    # Replication
    replica-serve-stale-data yes
    replica-read-only yes
    repl-diskless-sync no
    repl-diskless-sync-delay 5
    repl-disable-tcp-nodelay no
    replica-priority 100

    # Memory management
    maxmemory-policy noeviction

    # Logging
    loglevel notice
    
    # Security (no password for dev environment)
    protected-mode no
