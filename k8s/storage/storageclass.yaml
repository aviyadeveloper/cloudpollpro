apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ebs-gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
  # IOPS and throughput for gp3 (optional, uses defaults if not specified)
  # iops: "3000"           # 3000-16000 IOPS (default: 3000)
  # throughput: "125"      # 125-1000 MiB/s (default: 125)
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
reclaimPolicy: Delete
